<!doctype html>
<html lang="pt">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Nova Transferência – Confiance Motos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #000;
            color: #fff;
        }

        .container {
            max-width: 500px;
            margin: 30px auto;
            background: #111;
            padding: 20px;
            border-radius: 8px;
        }

        h2 {
            text-align: center;
            margin-top: 0;
        }

        label {
            display: block;
            margin: 10px 0 5px;
        }

        select,
        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #555;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            background: #666;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: #aaa;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Iniciar Transferência</h2>
        <p><strong>Venda:</strong> {{ venda.modelo }} - {{ venda.nome }}</p>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            <label>Responsável pela Transferência</label>
            <select name="responsavel">
                <option value="Loja">Loja / Despachante</option>
                <option value="Cliente">Próprio Cliente</option>
            </select>

            <label>Observações Iniciais</label>
            <textarea name="observacoes" rows="3"></textarea>

            <button type="submit">Iniciar Acompanhamento</button>
        </form>

        <a href="{{ url_for('vendas.vendas_home') }}" class="back">Cancelar</a>
    </div>
</body>

</html>
